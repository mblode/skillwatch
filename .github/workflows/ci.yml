name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run check

      - name: Test
        run: npm test

      - name: Pack dry run
        run: npm run pack:dry-run

  macos-smoke:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test macOS install flow
        run: |
          node dist/cli.js uninstall || true
          node dist/cli.js install --hour 10 --minute 5
          node dist/cli.js check-now
          node dist/cli.js uninstall
